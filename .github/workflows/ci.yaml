name: PR

# Controls when the action will run.
on:
  # Triggers the workflow on push or pull request events but only for the master branch
  push:
    branches: [ '**' ]

  # Allows you to run this workflow manually from the Actions tab. Use the
  # `run_try_runtime_live` input to opt into the expensive try-runtime
  # on-runtime-upgrade check against the testnet archive — that job is gated
  # off by default because it streams the entire on-chain state over the
  # archive WS endpoint and ties up a runner for an hour+.
  workflow_dispatch:
    inputs:
      run_try_runtime_live:
        description: 'Run try-runtime on-runtime-upgrade against testnet archive (slow/expensive)'
        required: false
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read
  security-events: write

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  format:
    name: Check Lints
    runs-on: ubuntu-24.04
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4
      - name: Install toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: 1.91.0
          override: true
          components: rustfmt
      - name: Check TOML
        uses: dprint/check@v2.2
      - name: Check Format
        run: |
          cargo fmt -- --check

  security-audit:
    name: Security Audit
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: 1.91.0
          override: true
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
      - name: Configure Git
        run: git config --global url."https://${{ secrets.GH_READ_TOKEN }}:x-oauth-basic@github.com/".insteadOf "https://github.com/"
      - name: Basic vulnerability check
        run: |
          # Use cargo tree to check for known vulnerabilities
          cargo tree --duplicates
          echo "✅ Basic dependency check completed"
      - name: Check for known vulnerable crates (manual)
        run: |
          echo "🔍 Checking for known vulnerable crate patterns..."
          if grep -r "openssl.*0\." Cargo.toml; then
            echo "⚠️  Old OpenSSL version detected"
          fi
                    echo "✅ Manual vulnerability patterns check completed"

  # Split cargo check into parallel jobs for faster execution
  check-runtime:
    name: Check Runtime
    needs: format
    # Heavy build job — runs on the self-hosted Hetzner pool that also runs
    # tests/tarpaulin and try-runtime live. Ubuntu-hosted runners run out of
    # disk on the wasm-builder stage.
    runs-on: ["self-hosted", "cere-network-memory-large"]
    steps:
      - uses: actions/checkout@v4
      - name: Install linux dependencies
        run: sudo apt update && sudo apt install -y build-essential cargo clang libclang-dev libssl-dev llvm libudev-dev make pkg-config protobuf-compiler
      - name: Install toolchain and rust-src
        uses: actions-rs/toolchain@v1
        with:
          toolchain: 1.91.0
          override: true
          target: wasm32-unknown-unknown
          components: rust-src
      - name: Enhanced Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "runtime-build"
          cache-on-failure: true
      - name: Configure Git
        run: git config --global url."https://${{ secrets.GH_READ_TOKEN }}:x-oauth-basic@github.com/".insteadOf "https://github.com/"
      - name: Check Runtime Build (Optimized)
        run: |
          # Build with optimizations for speed
          CARGO_INCREMENTAL=1 cargo check --release --features try-runtime --package cere-runtime --package cere-dev-runtime
      - name: Run dev chain
        run: |
          cargo build --release --bin cere
          timeout --preserve-status 30s ./target/release/cere --dev

  # Cheap try-runtime gate — just verifies the workspace still compiles with
  # the `try-runtime` feature flag. Runs on every push so we catch
  # try-runtime feature-gate regressions in PR CI.
  try-runtime-build:
    name: Try-Runtime Build
    needs: format
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install linux dependencies
        run: sudo apt update && sudo apt install -y build-essential cargo clang libclang-dev libssl-dev llvm libudev-dev make pkg-config protobuf-compiler
      - name: Install toolchain and rust-src
        uses: actions-rs/toolchain@v1
        with:
          toolchain: 1.91.0
          override: true
          target: wasm32-unknown-unknown
          components: rust-src
      - name: Enhanced Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "runtime-build"
          cache-on-failure: true
      - name: Configure Git
        run: git config --global url."https://${{ secrets.GH_READ_TOKEN }}:x-oauth-basic@github.com/".insteadOf "https://github.com/"
      - name: Build for try-runtime
        run: |
          CARGO_INCREMENTAL=1 cargo build --release --features try-runtime

  # Expensive try-runtime live check — streams the entire on-chain state from
  # archive.testnet.cere.network, then replays the runtime upgrade locally.
  # Mandatory for anything heading into the staging branch: PRs targeting
  # staging and direct pushes to staging both auto-run. Manual
  # workflow_dispatch (with `run_try_runtime_live=true`) is kept as an opt-in
  # for ad-hoc checks from other branches. Runs on the large self-hosted
  # Hetzner runner used by Generate Weights.
  check-try-runtime:
    name: Try-Runtime Check (live, testnet)
    needs: format
    if: |
      (github.event_name == 'pull_request' && github.base_ref == 'staging') ||
      (github.event_name == 'push' && github.ref == 'refs/heads/staging') ||
      (github.event_name == 'workflow_dispatch' && inputs.run_try_runtime_live)
    runs-on: ["self-hosted", "cere-network-memory-large"]
    steps:
      - uses: actions/checkout@v4
      - name: Install linux dependencies
        run: sudo apt update && sudo apt install -y build-essential cargo clang libclang-dev libssl-dev llvm libudev-dev make pkg-config protobuf-compiler
      - name: Install toolchain and rust-src
        uses: actions-rs/toolchain@v1
        with:
          toolchain: 1.91.0
          override: true
          target: wasm32-unknown-unknown
          components: rust-src
      - name: Enhanced Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "runtime-build"
          cache-on-failure: true
      - name: Configure Git
        run: git config --global url."https://${{ secrets.GH_READ_TOKEN }}:x-oauth-basic@github.com/".insteadOf "https://github.com/"
      - name: Install try-runtime
        run: cargo install --git https://github.com/paritytech/try-runtime-cli --tag v0.8.0 --locked
      - name: Build for try-runtime
        run: |
          CARGO_INCREMENTAL=1 cargo build --release --features try-runtime
      - name: Check Try-Runtime (cere-runtime vs testnet)
        run: |
          try-runtime --runtime ./target/release/wbuild/cere-runtime/cere_runtime.compact.compressed.wasm \
            on-runtime-upgrade --disable-idempotency-checks --blocktime 6000 live --uri wss://archive.testnet.cere.network:443

  clippy:
    name: Run Clippy
    needs: format
    # Heavy job — clippy compiles every member crate under
    # runtime-benchmarks,try-runtime. Move off ubuntu-hosted to avoid disk
    # exhaustion on the wasm-builder stage.
    runs-on: ["self-hosted", "cere-network-memory-large"]
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Install linux dependencies
        run: sudo apt update && sudo apt install -y build-essential cargo clang libclang-dev libssl-dev llvm libudev-dev make pkg-config protobuf-compiler
      - name: Install toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: 1.91.0
          override: true
          target: wasm32-unknown-unknown
          components: rust-src
      - name: Enhanced Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "clippy-build"
          cache-on-failure: true
      - name: Configure Git
        run: git config --global url."https://${{ secrets.GH_READ_TOKEN }}:x-oauth-basic@github.com/".insteadOf "https://github.com/"
      - name: Check with Clippy (Optimized)
        run: |
          # Run clippy with incremental compilation
          CARGO_INCREMENTAL=1 cargo clippy --no-deps --all-targets --features runtime-benchmarks,try-runtime --workspace -- --deny warnings

  tests:
    name: Run tests
    needs: format
    # The type of runner that the job will run on
    runs-on: ["self-hosted", "cere-network-memory-large"]
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4
      - name: Install linux dependencies
        run: sudo apt update && sudo apt install -y build-essential cargo clang libclang-dev libssl-dev llvm libudev-dev make pkg-config protobuf-compiler
      - name: Install toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: 1.91.0
          override: true
          target: wasm32-unknown-unknown
          components: rust-src
      - name: Configure Git
        run: git config --global url."https://${{ secrets.GH_READ_TOKEN }}:x-oauth-basic@github.com/".insteadOf "https://github.com/"
      - name: Enhanced Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "test-build"
          cache-on-failure: true
      - name: Install cargo-tarpaulin
        run: |
          # Install from source to avoid missing prebuilt binary tarballs on the runner
          cargo install cargo-tarpaulin --version 0.30.0 --locked
      - name: Run cargo-tarpaulin
        run: |
          cargo tarpaulin --verbose --locked --no-fail-fast --workspace \
            --features runtime-benchmarks --out "Xml" -- \
            --skip mock_clusters_gov::__construct_runtime_integrity_test::runtime_integrity_tests \
            --skip tests::call_size
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: tarpaulin coverage
          path: ./tarpaulin-report.xml

[package]
name = "cere-runtime-common"
version.workspace = true
authors.workspace = true
edition.workspace = true
homepage.workspace = true
license.workspace = true
readme.workspace = true
repository.workspace = true

[dependencies]
codec.workspace = true
log = { workspace = true, default-features = false }

ddc-primitives.workspace = true

# Substrate / Polkadot SDK
polkadot-sdk = { workspace = true, features = ["frame-support", "frame-system", "pallet-contracts", "pallet-referenda", "pallet-session", "sp-api", "sp-arithmetic", "sp-core", "sp-io", "sp-runtime", "sp-staking", "sp-std"] }

[features]
default = ["std"]
no_std = []
std = [
  "codec/std",
  "log/std",
  "ddc-primitives/std",
  "polkadot-sdk/std",
]

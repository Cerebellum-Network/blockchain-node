[package]
name = "cere-runtime"
version.workspace = true
authors.workspace = true
edition.workspace = true
homepage.workspace = true
license.workspace = true
readme.workspace = true
repository.workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
# 3rd-party dependencies
codec = { workspace = true, features = ["derive", "max-encoded-len"] }
hex-literal = { workspace = true, default-features = true, optional = true }
log.workspace = true
scale-info.workspace = true
static_assertions.workspace = true

# Substrate / Polkadot SDK
polkadot-sdk = { workspace = true, default-features = false, features = ["frame-election-provider-support", "frame-executive", "frame-support", "frame-system", "frame-system-rpc-runtime-api", "pallet-authority-discovery", "pallet-authorship", "pallet-babe", "pallet-bags-list", "pallet-balances", "pallet-bounties", "pallet-child-bounties", "pallet-collective", "pallet-contracts", "pallet-conviction-voting", "pallet-delegated-staking", "pallet-democracy", "pallet-election-provider-multi-phase", "pallet-elections-phragmen", "pallet-fast-unstake", "pallet-grandpa", "pallet-identity", "pallet-im-online", "pallet-indices", "pallet-insecure-randomness-collective-flip", "pallet-membership", "pallet-migrations", "pallet-multisig", "pallet-nomination-pools", "pallet-nomination-pools-benchmarking", "pallet-nomination-pools-runtime-api", "pallet-offences", "pallet-preimage", "pallet-proxy", "pallet-recovery", "pallet-referenda", "pallet-scheduler", "pallet-session", "pallet-staking", "pallet-staking-reward-curve", "pallet-sudo", "pallet-timestamp", "pallet-tips", "pallet-transaction-payment", "pallet-transaction-payment-rpc-runtime-api", "pallet-treasury", "pallet-utility", "pallet-vesting", "pallet-whitelist", "sp-api", "sp-arithmetic", "sp-authority-discovery", "sp-block-builder", "sp-consensus-babe", "sp-core", "sp-genesis-builder", "sp-inherents", "sp-io", "sp-offchain", "sp-runtime", "sp-session", "sp-staking", "sp-std", "sp-storage", "sp-transaction-pool", "sp-version"] }

# Cere dependencies
cere-runtime-common.workspace = true
ddc-dac-host.workspace = true
ddc-primitives.workspace = true
pallet-chainbridge.workspace = true
pallet-ddc-clusters.workspace = true
pallet-ddc-clusters-gov.workspace = true
pallet-ddc-customers.workspace = true
pallet-ddc-nodes.workspace = true
pallet-ddc-payouts.workspace = true
pallet-ddc-staking.workspace = true
pallet-ddc-verification.workspace = true
pallet-erc20.workspace = true
pallet-erc721.workspace = true
pallet-fee-handler.workspace = true
pallet-origins.workspace = true
pallet-pool-withdrawal-fix.workspace = true

# Hyperbridge
anyhow.workspace = true
ismp.workspace = true
ismp-grandpa.workspace = true
pallet-hyper-fungible-token.workspace = true
pallet-ismp.workspace = true
pallet-ismp-runtime-api.workspace = true

[build-dependencies]
substrate-wasm-builder = { workspace = true, default-features = true }

[features]
default = ["std"]
with-tracing = ["polkadot-sdk/frame-executive"]
std = [
  "codec/std",
  "scale-info/std",
  "log/std",
  "polkadot-sdk/std",
  "pallet-chainbridge/std",
  "pallet-erc721/std",
  "pallet-erc20/std",
  "ddc-dac-host/std",
  "ddc-primitives/std",
  "pallet-ddc-clusters/std",
  "pallet-ddc-customers/std",
  "pallet-ddc-nodes/std",
  "pallet-ddc-payouts/std",
  "pallet-ddc-staking/std",
  "pallet-ddc-verification/std",
  "cere-runtime-common/std",
  "pallet-origins/std",
  "pallet-pool-withdrawal-fix/std",
  "pallet-fee-handler/std",
  "anyhow/std",
  "ismp/std",
  "ismp-grandpa/std",
  "pallet-ismp/std",
  "pallet-ismp-runtime-api/std",
  "pallet-hyper-fungible-token/std",
]
runtime-benchmarks = [
  "polkadot-sdk/frame-benchmarking",
  "polkadot-sdk/frame-system-benchmarking",
  "polkadot-sdk/pallet-election-provider-support-benchmarking",
  "polkadot-sdk/pallet-offences-benchmarking",
  "polkadot-sdk/pallet-session-benchmarking",
  "polkadot-sdk/runtime-benchmarks",
  "pallet-ddc-customers/runtime-benchmarks",
  "pallet-ddc-clusters/runtime-benchmarks",
  "pallet-ddc-nodes/runtime-benchmarks",
  "pallet-ddc-staking/runtime-benchmarks",
  "pallet-ddc-payouts/runtime-benchmarks",
  "pallet-chainbridge/runtime-benchmarks",
  "ddc-primitives/runtime-benchmarks",
  "hex-literal",
  "pallet-ddc-clusters-gov/runtime-benchmarks",
  "pallet-origins/runtime-benchmarks",
  "pallet-pool-withdrawal-fix/runtime-benchmarks",
  "pallet-ddc-verification/runtime-benchmarks",
  "pallet-fee-handler/runtime-benchmarks",
  "pallet-ismp/runtime-benchmarks",
  "pallet-hyper-fungible-token/runtime-benchmarks",
]
try-runtime = [
  "polkadot-sdk/frame-try-runtime",
  "polkadot-sdk/try-runtime",
  "pallet-chainbridge/try-runtime",
  "pallet-ddc-clusters/try-runtime",
  "pallet-ddc-customers/try-runtime",
  "pallet-ddc-nodes/try-runtime",
  "pallet-ddc-payouts/try-runtime",
  "pallet-ddc-staking/try-runtime",
  "pallet-erc20/try-runtime",
  "pallet-erc721/try-runtime",
  "pallet-origins/try-runtime",
  "pallet-pool-withdrawal-fix/try-runtime",
  "pallet-ddc-clusters-gov/try-runtime",
  "pallet-ddc-verification/try-runtime",
  "pallet-ismp/try-runtime",
  "ismp-grandpa/try-runtime",
  "pallet-hyper-fungible-token/try-runtime",
]

# Enable the metadata hash generation in the wasm builder.
metadata-hash = ["substrate-wasm-builder/metadata-hash"]

# A feature that should be enabled when the runtime should be built for on-chain
# deployment. This will disable stuff that shouldn't be part of the on-chain wasm
# to make it smaller, like logging for example.
on-chain-release-build = ["metadata-hash"]
